# ============================================================
# Nginx config cho PR1AS
# Sau khi có domain: thay DOMAIN bằng domain thật
# Sau khi chạy Certbot: ssl_certificate sẽ được điền tự động
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name DOMAIN www.DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name DOMAIN www.DOMAIN;

    # SSL certificate — Certbot sẽ tự điền sau khi chạy:
    # certbot --nginx -d DOMAIN -d www.DOMAIN
    # ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # Socket.IO — PHẢI đặt trước /api/ vì path bắt đầu bằng /socket.io/
    location /socket.io/ {
        proxy_pass http://server:3052;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # REST API
    location /api/ {
        proxy_pass http://server:3052;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js client — catch-all
    location / {
        proxy_pass http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
