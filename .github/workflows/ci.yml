name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, release]

jobs:
  server-ci:
    name: Server — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SERVER

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SERVER/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck)
        run: npm run build

  client-ci:
    name: Client — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pr1as-client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pr1as-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck
