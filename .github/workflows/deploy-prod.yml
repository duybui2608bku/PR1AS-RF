name: Deploy Production

on:
  push:
    branches: [release]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/pr1as-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/pr1as-client

jobs:
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./SERVER
          file: ./docker/Dockerfile.server
          push: true
          tags: ${{ env.SERVER_IMAGE }}:latest

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: ./pr1as-client
          file: ./docker/Dockerfile.client
          push: true
          tags: ${{ env.CLIENT_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.PROD_NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production  # Yêu cầu manual approval trên GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/pr1as

            # Pull images mới từ registry
            docker pull ghcr.io/${{ github.repository_owner }}/pr1as-server:latest
            docker pull ghcr.io/${{ github.repository_owner }}/pr1as-client:latest

            # Khởi động lại với image mới
            make up ENV=prod

            # Dọn dẹp images cũ
            docker image prune -f
